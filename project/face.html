<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賽博照妖鏡 | AI 顏值鑑定</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { font-family: 'Share Tech Mono', monospace; background-color: #0a0a0a; color: #00ff41; }
        .neon-border { border: 1px solid #00ff41; box-shadow: 0 0 10px #00ff41; }
        .scan-line { width: 100%; height: 2px; background: #00ff41; position: absolute; top: 0; animation: scan 2s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
        .loading { display: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="text-center mb-8">
        <h1 class="text-3xl md:text-5xl font-bold mb-2 tracking-widest uppercase">Cyber Mirror</h1>
        <p class="text-sm opacity-70">SYSTEM_READY: 雲端中轉站已就緒 (Vercel Node.js)</p>
    </div>

    <div class="w-full max-w-md p-6 bg-black neon-border rounded-lg relative overflow-hidden">
        <div id="scanLine" class="scan-line hidden"></div>
        
        <div class="aspect-square w-full bg-zinc-900 mb-4 flex items-center justify-center relative border border-dashed border-green-900">
            <img id="preview" class="hidden w-full h-full object-cover" />
            <span id="placeholder" class="text-green-900 text-center p-4">等待上傳載入圖片...</span>
        </div>

        <div class="space-y-4">
            <input type="file" id="fileInput" accept="image/*" class="hidden">
            <button onclick="document.getElementById('fileInput').click()" 
                    class="w-full py-2 bg-green-900/20 hover:bg-green-900/40 border border-green-500 transition-all">
                選擇檔案 (SELECT_FILE)
            </button>
            
            <button id="analyzeBtn" onclick="startAnalysis()" 
                    class="w-full py-3 bg-green-600 text-black font-bold hover:bg-green-400 disabled:opacity-50 disabled:cursor-not-allowed">
                啟動 AI 鑑定 (RUN_ANALYSIS)
            </button>
        </div>

        <div id="resultArea" class="mt-6 p-4 border-t border-green-900 hidden">
            <h2 class="text-xl mb-2 underline">鑑定結果 (OUTPUT):</h2>
            <div id="resultText" class="text-lg leading-relaxed"></div>
        </div>
    </div>

    <p class="mt-8 text-xs opacity-50 uppercase tracking-tighter">Powered by Vercel Serverless & mehtmls-patch-1</p>

    <script>
        const API_URL = "https://save-sever.vercel.app/api/detector"; // 咱也就是說，這是你的永久域名！
        let base64Data = "";

        // 監聽文件選擇
        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function() {
                base64Data = reader.result.split(',')[1];
                document.getElementById('preview').src = reader.result;
                document.getElementById('preview').classList.remove('hidden');
                document.getElementById('placeholder').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        };

        async function startAnalysis() {
            if (!base64Data) return alert("請先上傳圖片，兄弟！");

            const btn = document.getElementById('analyzeBtn');
            const scanLine = document.getElementById('scanLine');
            const resultArea = document.getElementById('resultArea');
            const resultText = document.getElementById('resultText');

            // UI 狀態切換
            btn.disabled = true;
            btn.innerText = "ANALYZING...";
            scanLine.classList.remove('hidden');
            resultArea.classList.add('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ image: base64Data, lang: "zh" })
                });

                const data = await response.json();
                
                // 渲染結果
                resultArea.classList.remove('hidden');
                if (data.score) {
                    resultText.innerHTML = `
                        <div class="text-4xl font-bold text-yellow-400 mb-2">${data.score} 分</div>
                        <div class="text-sm opacity-80 italic">${data.msg || 'AI 表示無話可說'}</div>
                    `;
                } else {
                    resultText.innerText = "Error: " + (data.error || "AI 拒絕評價這張臉");
                }

            } catch (err) {
                resultText.innerText = "SYSTEM_FAILURE: " + err.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "RUN_ANALYSIS";
                scanLine.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
