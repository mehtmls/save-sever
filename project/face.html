<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Cyber Mirror · 賽博照妖鏡</title>
    <!-- Tailwind (輕量，僅用於佈局) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            background-color: #050505;
            color: #00ff41;
            text-rendering: geometricPrecision;
            -webkit-font-smoothing: none;
        }

        /* 自定義賽博邊框／光效 */
        .neon-border {
            border: 1px solid #00ff41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
            transition: box-shadow 0.2s;
        }

        .neon-border:hover {
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.6);
        }

        .scan-line {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.5);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 2s linear infinite;
            z-index: 20;
            pointer-events: none;  /* 讓滑鼠穿透，不擋按鈕 */
            box-shadow: 0 0 10px #00ff41;
        }

        @keyframes scan {
            from { top: 0; }
            to { top: 100%; }
        }

        .stat-card {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.2);
            backdrop-filter: blur(1px);
        }

        /* 自定義載入閃爍 */
        .glitch-text {
            animation: glitch 1.5s infinite steps(1);
        }

        @keyframes glitch {
            0%, 100% { opacity: 1; text-shadow: 0 0 5px #00ff41; }
            50% { opacity: 0.8; text-shadow: -2px 0 red, 2px 0 blue; }
        }

        /* 小狀態燈 */
        .status-led {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #00ff41;
            box-shadow: 0 0 8px #00ff41;
            margin-right: 4px;
        }

        .status-led.off {
            background-color: #1f3f2a;
            box-shadow: none;
        }

        /* 過渡效果 */
        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex flex-col items-center py-6 sm:py-10 px-4 min-h-screen">

    <!-- 頂部標題區塊 -->
    <div class="text-center mb-8 sm:mb-10 relative">
        <h1 class="text-4xl sm:text-5xl font-bold tracking-[0.2em] uppercase mb-2 glitch-text">Cyber Mirror</h1>
        <div class="flex items-center justify-center text-xs opacity-60 space-x-2">
            <span class="status-led" id="statusLed"></span>
            <span id="statusText">STANDBY</span>
            <span class="mx-2">//</span>
            <span>v2.0.1</span>
        </div>
        <p class="text-[10px] opacity-40 mt-1">[ 影像分析節點 // 即時回饋鏈路 ]</p>
    </div>

    <!-- 主鏡面卡匣 -->
    <div class="w-full max-w-2xl bg-black neon-border rounded-xl p-5 sm:p-6 relative" id="mirrorCard">
        <!-- 掃描線 (由JS控制顯示) -->
        <div id="scanLine" class="scan-line hidden"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
            <!-- 左：影像輸入區 -->
            <div>
                <div class="aspect-square w-full bg-zinc-900 rounded border border-green-900/50 flex items-center justify-center overflow-hidden relative group">
                    <img id="preview" class="hidden w-full h-full object-cover transition-opacity duration-300" alt="target capture" />
                    <div id="placeholder" class="text-center p-4 opacity-40 flex flex-col items-center">
                        <p class="text-5xl mb-2">⌁</p>
                        <p class="text-xs uppercase tracking-widest">等待影像鎖定</p>
                        <p class="text-[8px] mt-2 opacity-30">PNG / JPG / WEBP</p>
                    </div>
                    <!-- 清除預覽的小按鈕 (僅在圖片顯示時出現) -->
                    <button id="clearPreviewBtn" class="absolute top-2 right-2 w-6 h-6 bg-black/70 border border-green-700 rounded-full text-green-500 text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity hover:bg-green-900/50 focus:opacity-100 z-10" title="清除影像" style="display: none;">✕</button>
                </div>

                <!-- 控制列：選取、清除、分析 -->
                <div class="flex flex-col sm:flex-row gap-2 mt-4">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <button id="selectBtn" class="flex-1 py-2 border border-green-500 hover:bg-green-500/20 transition-all uppercase text-sm tracking-wider">
                        ⌂ 選取目標
                    </button>
                    <button id="clearBtn" class="flex-1 py-2 border border-green-800 text-green-700 hover:bg-green-900/30 transition-all uppercase text-sm tracking-wider" disabled>
                        ✕ 清除
                    </button>
                </div>

                <!-- 主要執行按鈕 -->
                <button id="analyzeBtn" class="w-full mt-2 py-4 bg-green-600 text-black font-bold hover:bg-green-400 transition-all uppercase tracking-widest disabled:opacity-30 disabled:bg-green-800 disabled:cursor-not-allowed" disabled>
                    ⚡ 啟動鑑定 (EXECUTE)
                </button>

                <!-- 簡易錯誤／提示區域 (內嵌) -->
                <div id="infoMessage" class="mt-3 text-[10px] text-center min-h-[20px] text-green-600/70 break-words"></div>
            </div>

            <!-- 右：分析結果區 (初始隱藏) -->
            <div id="resultArea" class="hidden space-y-4 fade-in">
                <div class="stat-card p-4 rounded text-center">
                    <span class="text-xs opacity-60 uppercase tracking-wider">整體魅力評分</span>
                    <div id="totalScore" class="text-6xl font-extrabold text-white my-1">--</div>
                    <p id="overallDesc" class="text-xs leading-relaxed opacity-80"></p>
                </div>

                <!-- 細項評分會動態生成至此 -->
                <div id="detailedStats" class="grid grid-cols-2 gap-2 text-[10px]"></div>
            </div>
        </div>

        <!-- 建議區塊 (初始隱藏) -->
        <div id="suggestionArea" class="hidden mt-8 pt-6 border-t border-green-900/50 grid grid-cols-1 md:grid-cols-3 gap-4 fade-in">
            <div class="stat-card p-3 rounded">
                <h4 class="text-xs font-bold mb-2 underline decoration-green-500">💄 妝容建議</h4>
                <p id="makeupSug" class="text-[10px] opacity-70 leading-relaxed"></p>
            </div>
            <div class="stat-card p-3 rounded">
                <h4 class="text-xs font-bold mb-2 underline decoration-green-500">💇 髮型建議</h4>
                <p id="hairSug" class="text-[10px] opacity-70 leading-relaxed"></p>
            </div>
            <div class="stat-card p-3 rounded">
                <h4 class="text-xs font-bold mb-2 underline decoration-green-500">👕 穿搭建議</h4>
                <p id="fashionSug" class="text-[10px] opacity-70 leading-relaxed"></p>
            </div>
        </div>
    </div>

    <!-- 頁腳備註 (純裝飾) -->
    <div class="text-[8px] opacity-30 mt-6 tracking-widest">
        * 基於量子風格算法 · 結果僅供賽博娛樂 *
    </div>

    <script>
        (function() {
            // ----- 嚴格模式，快取 DOM 節點 -----
            const dom = {
                fileInput: document.getElementById('fileInput'),
                preview: document.getElementById('preview'),
                placeholder: document.getElementById('placeholder'),
                analyzeBtn: document.getElementById('analyzeBtn'),
                selectBtn: document.getElementById('selectBtn'),
                clearBtn: document.getElementById('clearBtn'),
                clearPreviewBtn: document.getElementById('clearPreviewBtn'),
                scanLine: document.getElementById('scanLine'),
                resultArea: document.getElementById('resultArea'),
                suggestionArea: document.getElementById('suggestionArea'),
                totalScore: document.getElementById('totalScore'),
                overallDesc: document.getElementById('overallDesc'),
                detailedStats: document.getElementById('detailedStats'),
                makeupSug: document.getElementById('makeupSug'),
                hairSug: document.getElementById('hairSug'),
                fashionSug: document.getElementById('fashionSug'),
                infoMsg: document.getElementById('infoMessage'),
                statusLed: document.getElementById('statusLed'),
                statusText: document.getElementById('statusText')
            };

            // 狀態變數
            let base64Data = "";                // 不包含 data:image 前綴的純base64
            let isAnalyzing = false;

            // API 端點 (保留原有)
            const API_URL = "https://save-sever.vercel.app/api/detector";

            // ----- 輔助函式：更新狀態指示燈 (LED) -----
            function setStatus(mode, message = '') {
                const led = dom.statusLed;
                const text = dom.statusText;
                if (mode === 'busy') {
                    led.classList.remove('off');
                    led.style.background = '#ffff00';
                    led.style.boxShadow = '0 0 10px #ffff00';
                    text.innerText = message || 'PROCESSING';
                } else if (mode === 'error') {
                    led.classList.remove('off');
                    led.style.background = '#ff4444';
                    led.style.boxShadow = '0 0 10px #ff4444';
                    text.innerText = message || 'ERROR';
                } else if (mode === 'ready') {
                    led.classList.remove('off');
                    led.style.background = '#00ff41';
                    led.style.boxShadow = '0 0 8px #00ff41';
                    text.innerText = message || 'READY';
                } else {
                    // standby / off
                    led.classList.add('off');
                    led.style.background = '#1f3f2a';
                    led.style.boxShadow = 'none';
                    text.innerText = message || 'STANDBY';
                }
            }

            // ----- 重置所有結果，隱藏分析區塊，清空建議 -----
            function resetAnalysisUI() {
                // 隱藏結果區
                dom.resultArea.classList.add('hidden');
                dom.suggestionArea.classList.add('hidden');

                // 清空內容 (避免殘留)
                dom.totalScore.innerText = '--';
                dom.overallDesc.innerText = '';
                dom.detailedStats.innerHTML = '';    // 清空細項
                dom.makeupSug.innerText = '';
                dom.hairSug.innerText = '';
                dom.fashionSug.innerText = '';

                // 清除任何訊息
                dom.infoMsg.innerText = '';
            }

            // ----- 根據有無圖片更新按鈕狀態 -----
            function updateControls() {
                const hasImage = base64Data.length > 0;
                // 分析按鈕啟用／禁用 (且不在分析中)
                dom.analyzeBtn.disabled = !hasImage || isAnalyzing;
                // 清除按鈕啟用
                dom.clearBtn.disabled = !hasImage || isAnalyzing;
                // 小清除按鈕顯示與否
                if (hasImage) {
                    dom.clearPreviewBtn.style.display = 'flex';
                } else {
                    dom.clearPreviewBtn.style.display = 'none';
                }

                // 狀態燈待命或就緒
                if (!hasImage) {
                    setStatus('standby', 'NO INPUT');
                } else {
                    setStatus('ready', 'INPUT LOCKED');
                }
            }

            // ----- 清除所有影像資料，重置UI -----
            function clearAll() {
                if (isAnalyzing) return; // 分析中禁止清除

                base64Data = "";
                dom.fileInput.value = "";          // 清空檔案輸入
                dom.preview.classList.add('hidden');
                dom.preview.src = "";
                dom.placeholder.classList.remove('hidden');

                // 重置結果區
                resetAnalysisUI();

                // 更新按鈕
                updateControls();

                // 顯示短暫提示
                dom.infoMsg.innerText = "> 影像已清除，等待新目標 <";
            }

            // ----- 處理檔案選取 (變更時) -----
            function handleFileSelect(e) {
                const file = e.target.files[0];
                if (!file) {
                    // 使用者取消選取，不做事 (但可能原先已有圖片，保留)
                    return;
                }

                // 簡單的檔案類型/大小檢查 (限制 8MB)
                const maxSize = 8 * 1024 * 1024; // 8MB
                if (file.size > maxSize) {
                    dom.infoMsg.innerText = '⚠️ 檔案過大，請小於8MB';
                    dom.fileInput.value = '';  // 清空選擇
                    return;
                }
                if (!file.type.startsWith('image/')) {
                    dom.infoMsg.innerText = '⚠️ 請選擇圖片檔案';
                    dom.fileInput.value = '';
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(ev) {
                    // 儲存純 base64 (不含 data:image 開頭)
                    const fullBase64 = ev.target.result;
                    base64Data = fullBase64.split(',')[1];  // 逗號後方

                    // 顯示預覽
                    dom.preview.src = fullBase64;
                    dom.preview.classList.remove('hidden');
                    dom.placeholder.classList.add('hidden');

                    // 清除舊結果
                    resetAnalysisUI();

                    // 更新按鈕
                    updateControls();

                    // 提示訊息
                    dom.infoMsg.innerText = '> 目標鎖定，可執行分析 <';
                };
                reader.readAsDataURL(file);
            }

            // ----- 呼叫 API 執行分析 (核心) -----
            async function startAnalysis() {
                if (!base64Data) {
                    dom.infoMsg.innerText = '❌ 尚未選取影像';
                    return;
                }
                if (isAnalyzing) return;

                // 開始分析鎖
                isAnalyzing = true;
                setStatus('busy', 'ANALYZING');
                dom.analyzeBtn.disabled = true;
                dom.clearBtn.disabled = true;
                dom.scanLine.classList.remove('hidden');

                // 隱藏舊結果 (若有的話)
                dom.resultArea.classList.add('hidden');
                dom.suggestionArea.classList.add('hidden');
                dom.infoMsg.innerText = '⏳ 正在連接節點...';

                // 清空詳細區域(避免顯示上次的殘留)
                dom.detailedStats.innerHTML = '';

                try {
                    // 設定超時 (10秒)
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000);

                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: base64Data, lang: 'zh' }),
                        signal: controller.signal
                    }).catch(err => {
                        if (err.name === 'AbortError') throw new Error('請求超時 (10s)');
                        throw err;
                    });

                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        throw new Error(`伺服器回應 ${response.status}`);
                    }

                    const res = await response.json();
                    // 根據原有API結構: res.data.beauty_analysis
                    if (!res || !res.data || !res.data.beauty_analysis) {
                        throw new Error('API 回傳格式異常');
                    }

                    const d = res.data.beauty_analysis;

                    // 更新整體評分
                    dom.totalScore.innerText = d.overall_score?.score ?? '--';
                    dom.overallDesc.innerText = d.overall_score?.description ?? '無描述';

                    // 細項評分 (動態生成，使用 DOM 操作避免 XSS)
                    const breakdown = d.detailed_breakdown || {};
                    const statsContainer = dom.detailedStats;
                    statsContainer.innerHTML = ''; // 清空

                    for (const [key, value] of Object.entries(breakdown)) {
                        const score = value?.score ?? '?';
                        // 建立一個卡片格
                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'p-2 border border-green-900/30 flex justify-between items-center';
                        
                        const keySpan = document.createElement('span');
                        keySpan.className = 'opacity-50 uppercase tracking-wider';
                        keySpan.textContent = key;   // 安全使用 textContent
                        
                        const valSpan = document.createElement('span');
                        valSpan.className = 'text-white font-bold';
                        valSpan.textContent = score;
                        
                        itemDiv.appendChild(keySpan);
                        itemDiv.appendChild(valSpan);
                        statsContainer.appendChild(itemDiv);
                    }

                    // 建議區塊 (安全使用 innerText)
                    const rec = d.styling_recommendations || {};
                    dom.makeupSug.innerText = rec.makeup || '無特定建議';
                    dom.hairSug.innerText = rec.hairstyle || '—';
                    dom.fashionSug.innerText = rec.fashion || '—';

                    // 顯示區塊
                    dom.resultArea.classList.remove('hidden');
                    dom.suggestionArea.classList.remove('hidden');
                    dom.infoMsg.innerText = '✅ 分析完成，解讀中...';
                    setStatus('ready', 'ANALYZED');

                } catch (err) {
                    console.error('[分析錯誤]', err);
                    dom.infoMsg.innerText = `⚠️ 鑑定失敗: ${err.message || '未知錯誤'}`;
                    setStatus('error', 'FAILED');
                    // 可選擇保留之前結果或清空，此處不清空但隱藏結果
                    dom.resultArea.classList.add('hidden');
                    dom.suggestionArea.classList.add('hidden');
                } finally {
                    // 解鎖
                    isAnalyzing = false;
                    dom.analyzeBtn.disabled = (base64Data === '');
                    dom.clearBtn.disabled = (base64Data === '');
                    dom.scanLine.classList.add('hidden');

                    // 如果沒有圖片，狀態恢復 standby
                    if (!base64Data) setStatus('standby', 'NO INPUT');
                    updateControls(); // 再次確保按鈕一致性
                }
            }

            // ----- 初始化事件綁定 -----
            function init() {
                // 檔案選擇
                dom.fileInput.addEventListener('change', handleFileSelect);

                // 選取按鈕 (觸發隱藏file input)
                dom.selectBtn.addEventListener('click', () => {
                    if (isAnalyzing) {
                        dom.infoMsg.innerText = '⛔ 分析進行中，請稍後';
                        return;
                    }
                    dom.fileInput.click();
                });

                // 清除按鈕 (主要清除)
                dom.clearBtn.addEventListener('click', clearAll);

                // 預覽圖上的小清除
                dom.clearPreviewBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    clearAll();
                });

                // 分析按鈕 (使用原本的id，但移除內聯onclick，改用addEventListener)
                dom.analyzeBtn.addEventListener('click', startAnalysis);

                // 初始控制狀態
                updateControls();
                setStatus('standby', 'AWAITING INPUT');

                // 額外: 拖曳選取? 進階功能可加，為保持簡潔暫不加。
            }

            // 啟動所有
            init();
        })();
    </script>
    <!-- 注意：原 inline onclick 已移除，全由 script 管理 -->
</body>
</html>
