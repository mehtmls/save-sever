<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Mirror | 賽博照妖鏡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { font-family: 'Share Tech Mono', monospace; background-color: #050505; color: #00ff41; }
        .neon-border { border: 1px solid #00ff41; box-shadow: 0 0 15px rgba(0, 255, 65, 0.3); }
        .scan-line { width: 100%; height: 2px; background: #00ff41; position: absolute; top: 0; animation: scan 2s linear infinite; z-index: 10; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
        .stat-card { background: rgba(0, 255, 65, 0.05); border: 1px solid rgba(0, 255, 65, 0.2); }
    </style>
</head>
<body class="flex flex-col items-center py-10 px-4 min-h-screen">

    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold tracking-[0.2em] uppercase mb-2">Cyber Mirror</h1>
        <p class="text-xs opacity-60">Status: Link_Established // Signal: Strong</p>
    </div>

    <div class="w-full max-w-2xl bg-black neon-border rounded-xl p-6 relative">
        <div id="scanLine" class="scan-line hidden"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
                <div class="aspect-square w-full bg-zinc-900 rounded border border-green-900/50 flex items-center justify-center overflow-hidden relative">
                    <img id="preview" class="hidden w-full h-full object-cover" />
                    <div id="placeholder" class="text-center p-4 opacity-40">
                        <p class="text-4xl mb-2">?</p>
                        <p class="text-xs uppercase">等待載入影像資料</p>
                    </div>
                </div>
                <input type="file" id="fileInput" accept="image/*" class="hidden">
                <button onclick="document.getElementById('fileInput').click()" class="w-full mt-4 py-2 border border-green-500 hover:bg-green-500/20 transition-all uppercase text-sm">
                    選取目標 (Select)
                </button>
                <button id="analyzeBtn" onclick="startAnalysis()" class="w-full mt-2 py-4 bg-green-600 text-black font-bold hover:bg-green-400 transition-all uppercase tracking-widest">
                    啟動鑑定 (Execute)
                </button>
            </div>

            <div id="resultArea" class="hidden space-y-4">
                <div class="stat-card p-4 rounded text-center">
                    <span class="text-xs opacity-60 uppercase">整體魅力評分</span>
                    <div id="totalScore" class="text-6xl font-extrabold text-white my-1">--</div>
                    <p id="overallDesc" class="text-xs leading-relaxed opacity-80"></p>
                </div>

                <div id="detailedStats" class="grid grid-cols-2 gap-2 text-[10px]">
                    </div>
            </div>
        </div>

        <div id="suggestionArea" class="hidden mt-8 pt-6 border-t border-green-900/50 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="stat-card p-3 rounded">
                <h4 class="text-xs font-bold mb-2 underline">妝容建議</h4>
                <p id="makeupSug" class="text-[10px] opacity-70"></p>
            </div>
            <div class="stat-card p-3 rounded">
                <h4 class="text-xs font-bold mb-2 underline">髮型建議</h4>
                <p id="hairSug" class="text-[10px] opacity-70"></p>
            </div>
            <div class="stat-card p-3 rounded">
                <h4 class="text-xs font-bold mb-2 underline">穿搭建議</h4>
                <p id="fashionSug" class="text-[10px] opacity-70"></p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://save-sever.vercel.app/api/detector";
        let base64Data = "";

        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function() {
                base64Data = reader.result.split(',')[1];
                document.getElementById('preview').src = reader.result;
                document.getElementById('preview').classList.remove('hidden');
                document.getElementById('placeholder').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        };

        async function startAnalysis() {
            if (!base64Data) return alert("請先選取目標影像");

            const btn = document.getElementById('analyzeBtn');
            const scanLine = document.getElementById('scanLine');
            const resultArea = document.getElementById('resultArea');
            const sugArea = document.getElementById('suggestionArea');

            btn.disabled = true;
            btn.innerText = "PROCESSING...";
            scanLine.classList.remove('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ image: base64Data, lang: "zh" })
                });

                const res = await response.json();
                const d = res.data.beauty_analysis;

                // 顯示結果區域
                resultArea.classList.remove('hidden');
                sugArea.classList.remove('hidden');

                // 填入數據
                document.getElementById('totalScore').innerText = d.overall_score.score;
                document.getElementById('overallDesc').innerText = d.overall_score.description;
                
                // 細項評分
                const stats = d.detailed_breakdown;
                let statsHtml = "";
                for (const key in stats) {
                    statsHtml += `
                        <div class="p-2 border border-green-900/30">
                            <span class="opacity-50 uppercase">${key}</span>
                            <span class="float-right text-white font-bold">${stats[key].score}</span>
                        </div>
                    `;
                }
                document.getElementById('detailedStats').innerHTML = statsHtml;

                // 填入建議
                document.getElementById('makeupSug').innerText = d.styling_recommendations.makeup;
                document.getElementById('hairSug').innerText = d.styling_recommendations.hairstyle;
                document.getElementById('fashionSug').innerText = d.styling_recommendations.fashion;

            } catch (err) {
                console.error(err);
                alert("鑑定失敗，請檢查網路連接或雲端日誌");
            } finally {
                btn.disabled = false;
                btn.innerText = "Execute";
                scanLine.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
