<html>
<head>
</head>
<body>
    <div>
        <textarea id="ADsoutput" style="width: 100%;resize:vertical;max-height: 90%;min-height: 20%;" cols="30" rows="10" readonly></textarea>
    </div>
    <button onclick="clickstartADs()">點擊開始刷廣告</button> <a id="count">0</a>
    <style>

    </style>
    <script>
        var count = 0
        var startAD = false
        var interval = null
        function clickstartADs() {
            if (startAD) {
                clearInterval(interval)
                interval = null
                startAD = false
            } else {
                startAD = true
                interval = setInterval(()=> {
                    try {
                        fetch("https://itweepinbelltor.com/zone").then((response)=> {
                            if (response.ok) {
                                document.getElementById("ADsoutput").innerHTML += "\n什么？广告成功加载了？"
                            } else {
                                count++
                                document.getElementById("count").innerHTML = count
                            }
                        }).catch(()=> {
                            count++
                            document.getElementById("count").innerHTML = count
                        });
                    } catch (error) {
                        count++
                        document.getElementById("count").innerHTML = count
                    }
                }, 10)
            }
            document.getElementById("ADsoutput").innerHTML = startAD? "刷廣告中": "已停止刷廣告"
        }

    </script>
</body>
</html>
