<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Icon Wall Player</title>
    <style>
        #icon-wall {
            display: grid;
            gap: 2px;
            background: #222;
            padding: 10px;
            width: fit-content;
        }
        .row { display: contents; }
        .icon { width: 16px; height: 16px; }
        .devto { background: #000; border-radius: 4px; }
        .none { background: #eee; border-radius: 4px; }
    </style>
</head>
<body>

<div id="icon-wall"></div>

<script>
    let videoData = [];
    let frameIndex = 0;

    async function loadData() {
        const response = await fetch('video_array.txt');
        videoData = await response.json();
        
        // 設定網格寬度 (對應 Python 中的 target_width)
        const width = videoData[0][0].length;
        document.getElementById('icon-wall').style.gridTemplateColumns = `repeat(${width}, 1fr)`;
        
        // 開始播放
        setInterval(playFrame, 100); // 10fps = 100ms
    }

    function playFrame() {
        if (frameIndex >= videoData.length) frameIndex = 0;
        const container = document.getElementById('icon-wall');
        container.innerHTML = '';
        
        videoData[frameIndex].forEach(row => {
            row.forEach(val => {
                const div = document.createElement('div');
                div.className = val ? 'icon devto' : 'icon none';
                container.appendChild(div);
            });
        });
        frameIndex++;
    }

    loadData();
</script>
</body>
</html>
