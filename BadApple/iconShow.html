<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>BadApple</title>
    <style>
      #player { 
        max-width: 100%; 
        height: auto; 
        object-fit: contain; 
        display: block; 
      }
    </style>
  </head>
  <body>
    <div id="icon-wall">
      <img id="player" alt="BadApple Animation" />
    </div>

    <script>
  let videoData = [];
      let frameIndex = 0;
      const BUFFER_SIZE = 30;
      // 初始化一個包含 30 個 Image 物件的陣列，作為硬體級快取池
      let BufferPool = Array.from({ length: BUFFER_SIZE }, () => new Image());

      function mapLogo(matrix, logos) {
        const mapped = matrix.flat().map(val => logos[val]);
        return { icons: mapped.join(','), width: matrix[0] ? matrix[0].length : 0 };
      }

      function generateUrl(frame) {
        const { icons, width } = mapLogo(frame, ["devto","none"]);
        return `https://skillicons.dev/icons?i=${icons}&perline=${width}`;
      }

      function fillBuffer() {
        // 預載入策略：將未來 30 幀預先寫入 Pool
        for (let i = 0; i < BUFFER_SIZE; i++) {
          const targetIdx = (frameIndex + i) % videoData.length;
          // 將生成的 URL 賦給對應的 Image 物件，瀏覽器會自動開始下載
          BufferPool[i].src = generateUrl(videoData[targetIdx]);
        }
      }

      async function loadData() {
        try {
          const response = await fetch("video_array.txt");
          videoData = await response.json();
          // 初始化時先填滿緩衝
          fillBuffer();
          setInterval(playFrame, 100); 
        } catch (e) {
          console.error("數據載入失敗:", e);
        }
      }

      function playFrame() {
        if (videoData.length === 0) return;

        // 1. 取得當前幀的圖片（從緩衝池拿）
        const container = document.getElementById("player");
        container.src = BufferPool[0].src; 

        // 2. 更新索引
        frameIndex = (frameIndex + 1) % videoData.length;

        // 3. 滾動緩衝池：將已播放的移到最後，並更新為最新的未來幀
        const usedImg = BufferPool.shift(); // 取出第一個
        const nextIdx = (frameIndex + BUFFER_SIZE - 1) % videoData.length;
        usedImg.src = generateUrl(videoData[nextIdx]); // 更新為最新的 frame
        BufferPool.push(usedImg); // 放回尾端
      }

      loadData();
    </script>
  </body>
</html>
