<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>BadApple</title>
    <style>
      #player { 
        max-width: 100%; 
        height: auto; 
        object-fit: contain; 
        display: block; 
      }
    </style>
  </head>
  <body>
    <div id="icon-wall">
      <img id="player" alt="BadApple Animation" />
    </div>

    <script>
      let urlArray = []; // 預先計算好的所有幀 URL
      let frameIndex = 0;

      function mapLogo(matrix, logos) {
        const mapped = matrix.flat().map(val => logos[val]);
        return {
          icons: mapped.join(','),
          width: matrix[0] ? matrix[0].length : 0,
        };
      }

      function generateUrl(frame) {
        const { icons, width } = mapLogo(frame, ["none", "devto"]);
        return `https://skillicons.dev/icons?i=${icons}&perline=${width}`;
      }

     async function loadData() {
        try {
          const response = await fetch("video_array.txt");
          const videoData = await response.json();
          
          // 1. 初始化一個陣列來儲存已載入的圖片物件
          // 這將會強制瀏覽器將圖片存入緩存
          const preload = async (url) => {
            return new Promise((resolve) => {
              const img = new Image();
              img.onload = resolve; // 確保圖片完全下載完才算完成
              img.src = url;
            });
          };

          // 2. 一口氣產生所有 URL
          urlArray = videoData.map(frame => generateUrl(frame));
        
          for (let i = 0; i < urlArray.length; i++) {
            await preload(url)
          }
          // 開始播放
          setInterval(playFrame, 100); 
        } catch (e) {
          console.error("載入失敗:", e);
        }
      }
      function playFrame() {
        if (urlArray.length === 0) return;

        const container = document.getElementById("player");
        container.src = urlArray[frameIndex]; 
        
        // 更新索引並循環
        frameIndex = (frameIndex + 1) % urlArray.length;
      }

      loadData();
    </script>
  </body>
</html>
