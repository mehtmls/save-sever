<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>BadApple</title>
    <style>
      #player { 
        max-width: 100%; 
        height: auto; 
        object-fit: contain; 
        display: block; 
      }
    </style>
  </head>
  <body>
    <div id="icon-wall">
      <img id="player" alt="BadApple Animation" />
    </div>

    <script>
      let videoData = [];
      let frameIndex = 0;
      let urlBuffer = []; 
      const BUFFER_SIZE = 30; 

      function mapLogo(matrix, logos) {
        const mapped = matrix.flat().map(val => logos[val]);
        return {
          icons: mapped.join(','),
          width: matrix[0] ? matrix[0].length : 0,
        };
      }

      function generateUrl(frame) {
        const { icons, width } = mapLogo(frame, ["none", "devto"]);
        return `https://skillicons.dev/icons?i=${icons}&perline=${width}`;
      }

      // 填充緩衝區：維持 30 幀的預載入空間
      function fillBuffer() {
        while (urlBuffer.length < BUFFER_SIZE && videoData.length > 0) {
          // 計算目標幀索引，實現循環播放
          const nextIdx = (frameIndex + urlBuffer.length) % videoData.length;
          urlBuffer.push(generateUrl(videoData[nextIdx]));
        }
      }

      async function loadData() {
        try {
          const response = await fetch("video_array.txt");
          videoData = await response.json();
          // 開始播放
          setInterval(playFrame, 100); 
        } catch (e) {
          console.error("無法載入數據:", e);
        }
      }

      function playFrame() {
        if (videoData.length === 0) return;

        fillBuffer();

        if (urlBuffer.length > 0) {
          const container = document.getElementById("player");
          container.src = urlBuffer.shift(); 
          frameIndex = (frameIndex + 1) % videoData.length;
        }
      }

      loadData();
    </script>
  </body>
</html>
